name: SnakeBet
options:
  bundleIdPrefix: com.snakebet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIStatusBarHidden: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
targets:
  SnakeBet:
    type: application
    platform: iOS
    sources:
      - path: SnakeBet
        excludes:
          - Resources/**
    resources:
      - path: SnakeBet/Resources
      - path: SnakeBet/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snakebet.app
        INFOPLIST_KEY_CFBundleDisplayName: SnakeBet
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
    dependencies: []
